name: Release

on:
  push:
    tags:
      - '**'

jobs:
  build:
    strategy:
      matrix:
        # The only available image for x86 is macos-13-large
        # https://github.com/actions/runner-images?tab=readme-ov-file#available-images
        os: [ macos-13, macos-latest, windows-latest ]
        include:
          - os: macos-13
            packageType: dmg
          - os: macos-latest
            packageType: dmg
          - os: windows-latest
            packageType: msi
    runs-on: ${{ matrix.os }}
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'jetbrains'
          java-version: 21
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew packageAndRenameReleaseDistributionForCurrentOS
      - uses: actions/upload-artifact@v4
        with:
          name: distribution-${{ matrix.os }}
          if-no-files-found: error
          path: |
            build/compose/binaries/main-release/${{ matrix.packageType }}/*

  release:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'pubiqq'
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create release and upload dists
        uses: softprops/action-gh-release@v2
        with:
          files: |
            distribution-*/*.dmg
            distribution-*/*.msi
          draft: true
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
